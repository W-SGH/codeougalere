  <!-- Pare-brise avant -->
  <path d="M20 9 L22 15 L18 15 L18 9.2Z" fill="#FFD700" opacity="0.5"/>
  <!-- Pare-brise arrière -->
  <path d="M12 9 L10 15 L14 15 L14 9.2Z" fill="#FFD700" opacity="0.5"/>
  <!-- Roue gauche -->
  <circle cx="9.5" cy="22" r="3.2" fill="#1a1a1a"/>
  <circle cx="9.5" cy="22" r="1.5" fill="#FFD700"/>
  <!-- Roue droite -->
